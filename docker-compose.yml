# ============================================
# Docker Compose - Autonomous AI Startup
# ============================================
# Quick start:
#   docker compose up -d          # Start (builds if needed)
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#   docker compose up -d --build  # Rebuild and start
# ============================================

services:
  # ---- Next.js Mission Control ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-control
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mission-control.rule=Host(`mission-control.vigourclaw.cloud`)"
      - "traefik.http.routers.mission-control.entrypoints=websecure"
      - "traefik.http.routers.mission-control.tls=true"
      - "traefik.http.routers.mission-control.tls.certresolver=letsencrypt"
      - "traefik.http.services.mission-control.loadbalancer.server.port=3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--openssl-legacy-provider
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - DATABASE_PATH=.data/startup.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Authentication
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-changeme}
      - API_KEY=${API_KEY:-}
      # OpenClaw Gateway
      - OPENCLAW_GATEWAY_HOST=openclaw-whdd-openclaw-1
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://openclaw-whdd-openclaw-1:45397}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-45397}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-MzLeAvE5uphx5w6WzwFHxJQdP1s4OalJ}
      - OPENCLAW_CLIENT_ID=${OPENCLAW_CLIENT_ID:-openclaw-control-ui}
      - OPENCLAW_CLIENT_MODE=${OPENCLAW_CLIENT_MODE:-webchat}
      # OPENCLAW_PRIVATE_KEY= (inline key - leave empty to use file path instead)
      - OPENCLAW_PRIVATE_KEY_PATH=/app/data/openclaw-private-key.pem
      - NEXT_PUBLIC_OPENCLAW_ORIGIN_URL=${NEXT_PUBLIC_OPENCLAW_ORIGIN_URL:-}
      - OPENCLAW_CONFIG_PATH=${OPENCLAW_CONFIG_PATH:-}
      - OPENCLAW_STATE_DIR=${OPENCLAW_STATE_DIR:-}
      - OPENCLAW_MEMORY_DIR=${OPENCLAW_MEMORY_DIR:-}
      # AI Models
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-3-opus}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-claude-3-sonnet}
      # Network Security
      - MC_ALLOWED_HOSTS=${MC_ALLOWED_HOSTS:-}
      - MC_ALLOW_ANY_HOST=${MC_ALLOW_ANY_HOST:-}
      # Data Retention
      - MC_RETAIN_ACTIVITIES_DAYS=${MC_RETAIN_ACTIVITIES_DAYS:-90}
      - MC_RETAIN_AUDIT_DAYS=${MC_RETAIN_AUDIT_DAYS:-365}
      - MC_RETAIN_TOKEN_USAGE_DAYS=${MC_RETAIN_TOKEN_USAGE_DAYS:-90}
    volumes:
      # Persist SQLite database across container restarts
      - app-data:/app/.data
      # Mount data directory for OpenClaw private key
      - ./data:/app/data:ro
    networks:
      - my-ai-startup_default
      - traefik
      - openclaw-whdd_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/system/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Task Worker ----
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-control-worker
    command: node worker.js
    environment:
      - NODE_ENV=production
      - API_URL=http://mission-control:3000
      - POLL_INTERVAL=5000
    depends_on:
      - app
    networks:
      - my-ai-startup_default
      - traefik
      - openclaw-whdd_default
    restart: unless-stopped

# ---- Named Volumes ----
volumes:
  app-data:
    driver: local

# ---- Networks ----
networks:
  my-ai-startup_default:
    external: true
  traefik:
    external: true
  openclaw-whdd_default:
    external: true
