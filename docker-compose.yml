# ============================================
# Docker Compose - Autonomous AI Startup
# ============================================
# Quick start:
#   docker compose up -d          # Start (builds if needed)
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#   docker compose up -d --build  # Rebuild and start
# ============================================

services:
  # ---- Next.js Mission Control ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-control
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - DATABASE_PATH=.data/startup.db
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-changeme}
      - API_KEY=${API_KEY:-}
      - OPENCLAW_GATEWAY_HOST=${OPENCLAW_GATEWAY_HOST:-}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-3-opus}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-claude-3-sonnet}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persist SQLite database across container restarts
      - app-data:/app/.data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/agents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ---- Named Volumes ----
volumes:
  app-data:
    driver: local
